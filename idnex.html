<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薬剤知識テスト</title>
<style>
:root{
  --primary:#1E63E0;
  --primary-dark:#134FBB;
  --primary-light:#EAF2FF;
  --ink:#1B1F27;
  --sub:#5B6472;
  --line:#E3E8F0;
  --card:#FFFFFF;
  --bg:#F5F7FB;
  --good:#1AA260;
  --good-bg:#E7F7EF;
  --bad:#E5484D;
  --bad-bg:#FDECEC;
  --radius:14px;
  --imp1:#C0392B;
  --imp0:#8A93A3;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic Medium","Noto Sans JP",Meiryo,sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
}
.app{max-width:760px;margin:0 auto;padding-bottom:60px;}
header.top{
  background:linear-gradient(135deg,var(--primary) 0%, var(--primary-dark) 100%);
  color:#fff;
  padding:28px 20px 24px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
header.top::before{
  content:"";
  position:absolute;
  right:-40px; top:-40px;
  width:160px;height:160px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
}
header.top::after{
  content:"";
  position:absolute;
  left:-30px; bottom:-50px;
  width:120px;height:120px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
}
.pill-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:44px;height:44px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  margin-bottom:8px;
}
header.top h1{
  margin:4px 0 2px;
  font-size:1.5rem;
  font-weight:800;
  letter-spacing:.02em;
}
header.top p{
  margin:0;
  font-size:.8rem;
  opacity:.85;
}
main{padding:20px 18px 10px;}
.section{margin-bottom:26px;}
.section h2{
  font-size:1.05rem;
  font-weight:800;
  margin:0 0 10px;
  display:flex;
  align-items:center;
  gap:8px;
}
.section h2 .num{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:22px;height:22px;
  border-radius:6px;
  background:var(--primary);
  color:#fff;
  font-size:.75rem;
  font-weight:800;
}
.chip-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.chip{
  border:1.5px solid var(--primary);
  background:#fff;
  color:var(--primary);
  padding:9px 16px;
  border-radius:999px;
  font-size:.85rem;
  font-weight:700;
  cursor:pointer;
  transition:.15s;
  user-select:none;
}
.chip:hover{background:var(--primary-light);}
.chip.active{background:var(--primary);color:#fff;}
.chip.small{padding:6px 12px;font-size:.78rem;}
.hint-note{font-size:.75rem;color:var(--sub);margin-top:6px;}
.seg{
  display:inline-flex;
  border:1.5px solid var(--primary);
  border-radius:10px;
  overflow:hidden;
}
.seg button{
  border:none;
  background:#fff;
  color:var(--primary);
  padding:10px 22px;
  font-size:.9rem;
  font-weight:700;
  cursor:pointer;
}
.seg button.active{background:var(--primary);color:#fff;}
.cat-box{
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  padding:12px;
  max-height:200px;
  overflow-y:auto;
}
.cat-toolbar{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;
}
.cat-toolbar .link-btn{
  background:none;border:none;color:var(--primary);font-size:.78rem;font-weight:700;cursor:pointer;
  padding:2px 4px;
}
.cat-count{font-size:.75rem;color:var(--sub);}
.cat-list{display:flex;flex-wrap:wrap;gap:6px;}
.cat-chip{
  border:1px solid var(--line);
  background:#F8FAFD;
  color:var(--sub);
  padding:5px 10px;
  border-radius:8px;
  font-size:.72rem;
  cursor:pointer;
}
.cat-chip.active{
  background:var(--primary-light);
  border-color:var(--primary);
  color:var(--primary-dark);
  font-weight:700;
}
.start-btn{
  display:block;
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-size:1.05rem;
  font-weight:800;
  cursor:pointer;
  margin-top:6px;
  box-shadow:0 8px 20px rgba(30,99,224,.25);
}
.start-btn:disabled{background:#B9C4D6;box-shadow:none;cursor:not-allowed;}
.warn{
  font-size:.8rem;color:var(--bad);margin-top:8px;font-weight:700;
}

/* Quiz screen */
.quiz-top{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px 0;
  font-size:.8rem;color:var(--sub);
}
.progress-bar{
  height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin:8px 18px 0;
}
.progress-bar>div{height:100%;background:var(--primary);transition:width .25s;}
.score-badge{font-weight:800;color:var(--primary);}

.cards{
  padding:18px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.hcard{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px 16px;
  box-shadow:0 1px 2px rgba(20,30,60,.04);
}
.hcard.full{grid-column:1/-1;}
.hcard .label{
  font-size:.75rem;font-weight:800;color:var(--sub);margin-bottom:6px;
  display:flex;align-items:center;gap:6px;
}
.hcard .value{font-size:1.02rem;font-weight:700;line-height:1.45;}
.hcard.imp .value{color:var(--imp1);}
.badge-imp{
  display:inline-block;font-size:.68rem;font-weight:800;
  padding:2px 8px;border-radius:6px;
}
.badge-imp.top{background:#FBE7E5;color:var(--imp1);}
.badge-imp.normal{background:#EEF0F4;color:var(--imp0);}

.answer-zone{padding:4px 18px 18px;}
.answer-zone h3{
  font-size:.85rem;color:var(--sub);font-weight:800;margin:6px 0 10px;
}
.choice-list{display:flex;flex-direction:column;gap:10px;}
.choice-btn{
  width:100%;
  text-align:left;
  padding:14px 16px;
  border-radius:12px;
  border:1.5px solid var(--line);
  background:#fff;
  font-size:.95rem;
  font-weight:600;
  color:var(--ink);
  cursor:pointer;
  line-height:1.4;
  transition:.12s;
}
.choice-btn:hover:not(:disabled){border-color:var(--primary);background:var(--primary-light);}
.choice-btn.correct{background:var(--good-bg);border-color:var(--good);color:#0E7A46;}
.choice-btn.wrong{background:var(--bad-bg);border-color:var(--bad);color:#B4272B;}
.choice-btn:disabled{cursor:default;}

.write-row{display:flex;gap:10px;}
.write-row input{
  flex:1;
  padding:14px 16px;
  border-radius:12px;
  border:1.5px solid var(--line);
  font-size:1rem;
  font-family:inherit;
}
.write-row input:focus{outline:none;border-color:var(--primary);}
.write-row input.shake{
  animation:shake .3s;
  border-color:var(--bad);
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  75%{transform:translateX(6px);}
}
.write-row button{
  padding:0 22px;
  border:none;border-radius:12px;
  background:var(--primary);color:#fff;font-weight:800;font-size:.95rem;
  cursor:pointer;
}
.write-row button:disabled{background:#B9C4D6;cursor:not-allowed;}

.feedback{
  margin:14px 18px 0;
  padding:14px 16px;
  border-radius:12px;
  font-size:.92rem;
  font-weight:700;
  display:none;
}
.feedback.show{display:block;}
.feedback.correct{background:var(--good-bg);color:#0E7A46;border:1px solid #BEEBD3;}
.feedback.wrong{background:var(--bad-bg);color:#B4272B;border:1px solid #F7C6C7;}
.feedback .sub{font-weight:500;font-size:.85rem;margin-top:4px;color:var(--sub);}

.next-btn{
  display:block;width:calc(100% - 36px);margin:14px 18px 0;
  padding:14px;border:none;border-radius:12px;
  background:var(--ink);color:#fff;font-weight:800;font-size:.95rem;cursor:pointer;
}

.quiz-footer{padding:22px 18px 6px;text-align:center;}
.quiz-footer button{
  background:none;border:none;color:var(--sub);font-size:.8rem;text-decoration:underline;cursor:pointer;
}

/* Result screen */
.result-hero{
  text-align:center;padding:34px 20px 10px;
}
.result-hero .big{
  font-size:3rem;font-weight:900;color:var(--primary);line-height:1;
}
.result-hero .lbl{color:var(--sub);font-size:.9rem;margin-top:6px;}
.result-msg{
  text-align:center;font-size:1rem;font-weight:800;margin-top:6px;
}
.review-list{padding:10px 18px;}
.review-item{
  border:1px solid var(--line);background:#fff;border-radius:12px;
  padding:12px 14px;margin-bottom:10px;font-size:.85rem;
}
.review-item .qname{font-weight:800;margin-bottom:4px;}
.review-item .ans-wrong{color:var(--bad);}
.review-item .ans-correct{color:var(--good);}
.result-actions{display:flex;gap:10px;padding:14px 18px 30px;}
.result-actions button{
  flex:1;padding:14px;border-radius:12px;font-weight:800;font-size:.9rem;cursor:pointer;
}
.result-actions .primary{border:none;background:var(--primary);color:#fff;}
.result-actions .ghost{border:1.5px solid var(--line);background:#fff;color:var(--ink);}

.hidden{display:none !important;}
@media(max-width:480px){
  .cards{grid-template-columns:1fr;}
  header.top h1{font-size:1.3rem;}
}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="pill-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="8" width="18" height="8" rx="4" transform="rotate(-45 12 12)" stroke="#fff" stroke-width="2"/>
        <line x1="9.5" y1="9.5" x2="12" y2="12" stroke="#fff" stroke-width="2"/>
      </svg>
    </div>
    <h1 id="appTitle">薬剤知識テスト</h1>
    <p id="appSub">main.tex の薬剤データからクイズを出題します</p>
  </header>

  <!-- ===================== 設定画面 ===================== -->
  <main id="setupScreen">
    <div class="section">
      <h2><span class="num">1</span>出題範囲</h2>
      <div class="cat-box">
        <div class="cat-toolbar">
          <span class="cat-count" id="catCount">33 / 33 分類を選択中</span>
          <div>
            <button class="link-btn" id="catAll">全選択</button>
            <button class="link-btn" id="catNone">全解除</button>
          </div>
        </div>
        <div class="cat-list" id="catList"></div>
      </div>
    </div>

    <div class="section">
      <h2><span class="num">2</span>ヒントに表示する項目</h2>
      <div class="chip-row" id="hintChips"></div>
      <div class="hint-note">出題時にカードとして表示される情報です（複数選択可）</div>
    </div>

    <div class="section">
      <h2><span class="num">3</span>答えるもの</h2>
      <div class="chip-row" id="answerChips"></div>
    </div>

    <div class="section">
      <h2><span class="num">4</span>回答形式</h2>
      <div class="seg" id="formatSeg">
        <button data-v="write" class="active">筆記</button>
        <button data-v="choice">選択</button>
      </div>
    </div>

    <div class="section">
      <h2><span class="num">5</span>出題する重要度</h2>
      <div class="seg" id="importanceSeg">
        <button data-v="all" class="active">すべて出題</button>
        <button data-v="top">最重要のみ</button>
      </div>
      <div class="hint-note" id="importanceNote">全剤が出題対象です</div>
    </div>

    <div class="section">
      <h2><span class="num">6</span>問題数</h2>
      <div class="chip-row" id="countChips">
        <button class="chip small active" data-v="10">10問</button>
        <button class="chip small" data-v="20">20問</button>
        <button class="chip small" data-v="9999">全問</button>
      </div>
    </div>

    <div id="warnBox"></div>
    <button class="start-btn" id="startBtn">スタート</button>
  </main>

  <!-- ===================== クイズ画面 ===================== -->
  <main id="quizScreen" class="hidden">
    <div class="quiz-top">
      <span id="qIndex">問題 1 / 10</span>
      <span class="score-badge" id="qScore">正解 0</span>
    </div>
    <div class="progress-bar"><div id="progressFill" style="width:0%"></div></div>

    <div class="cards" id="hintCards"></div>

    <div class="answer-zone">
      <h3 id="answerLabel">答え：名称</h3>
      <div id="choiceArea" class="choice-list hidden"></div>
      <div id="writeArea" class="write-row hidden">
        <input type="text" id="writeInput" placeholder="答えを入力…" autocomplete="off">
        <button id="writeSubmit">回答</button>
      </div>
    </div>

    <div class="feedback" id="feedback"></div>
    <button class="next-btn hidden" id="nextBtn">次の問題へ</button>

    <div class="quiz-footer">
      <button id="quitBtn">テストを中断して設定に戻る</button>
    </div>
  </main>

  <!-- ===================== 結果画面 ===================== -->
  <main id="resultScreen" class="hidden">
    <div class="result-hero">
      <div class="big" id="resultScore">0 / 0</div>
      <div class="lbl">正解数</div>
      <div class="result-msg" id="resultMsg"></div>
    </div>
    <div class="review-list" id="reviewList"></div>
    <div class="result-actions">
      <button class="ghost" id="backToSetup">設定に戻る</button>
      <button class="primary" id="retryBtn">もう一度</button>
    </div>
  </main>
</div>

<script>

   データ: main.tex（薬剤一覧表）から構造化した薬剤データ

{c:"Ca²⁺チャネル阻害薬",n:"ジルチアゼム",i:"狭心症、不整脈、本態性高血圧",f:"ベンゾジアゼピン系",imp:1},
{c:"Ca²⁺チャネル阻害薬",n:"ベラパミル",i:"不整脈、狭心症",f:"フェニルアルキルアミン系、心臓選択性",imp:1},

{c:"エンドセリン関連薬",n:"ボセンタン",i:"肺動脈性肺高血圧症",f:"ET(A/B)拮抗薬",imp:1},
{c:"エンドセリン関連薬",n:"アンブリセンタン",i:"肺動脈性肺高血圧症",f:"ET(A)（平滑筋）のみに作用",imp:1},
];

/* フィールド定義 */
const FIELDS = [
  {key:"c", label:"分類"},
  {key:"n", label:"名称"},
  {key:"i", label:"適用"},
  {key:"f", label:"特徴"},
  {key:"imp", label:"重要度"},
];
function fieldLabel(key){return FIELDS.find(f=>f.key===key).label;}
function impText(v){return v===1 ? "最重要" : "重要";}
function displayValue(item, key){
  if(key==="imp") return impText(item.imp);
  return item[key];
}

/* =====================================================================
   状態管理
   ===================================================================== */
const state = {
  hintKeys: new Set(["c","i","f"]),
  answerKey: "n",
  format: "write",
  importanceFilter: "all",
  count: 10,
  selectedCats: new Set(),
  quiz: [],
  qi: 0,
  score: 0,
  history: [],
  currentChoices: [],
  currentAnswerSet: { list: [], normSet: new Set() },
  writeStage: "answer",
};

const ALL_CATS = [...new Set(DATA.map(d=>d.c))];
state.selectedCats = new Set(ALL_CATS);

/* =====================================================================
   セットアップ画面構築
   ===================================================================== */
const catList = document.getElementById("catList");
ALL_CATS.forEach(cat=>{
  const b = document.createElement("button");
  b.className = "cat-chip active";
  b.textContent = cat;
  b.addEventListener("click", ()=>{
    if(state.selectedCats.has(cat)){
      state.selectedCats.delete(cat);
      b.classList.remove("active");
    }else{
      state.selectedCats.add(cat);
      b.classList.add("active");
    }
    updateCatCount();
  });
  catList.appendChild(b);
});
function updateCatCount(){
  document.getElementById("catCount").textContent =
    `${state.selectedCats.size} / ${ALL_CATS.length} 分類を選択中`;
  updateImportanceNote();
  validateStart();
}
document.getElementById("catAll").addEventListener("click", ()=>{
  state.selectedCats = new Set(ALL_CATS);
  document.querySelectorAll(".cat-chip").forEach(el=>el.classList.add("active"));
  updateCatCount();
});
document.getElementById("catNone").addEventListener("click", ()=>{
  state.selectedCats = new Set();
  document.querySelectorAll(".cat-chip").forEach(el=>el.classList.remove("active"));
  updateCatCount();
});
updateCatCount();
updateImportanceNote();

const hintChipsEl = document.getElementById("hintChips");
const answerChipsEl = document.getElementById("answerChips");
FIELDS.forEach(f=>{
  const hb = document.createElement("button");
  hb.className = "chip" + (state.hintKeys.has(f.key) ? " active" : "");
  hb.textContent = f.label;
  hb.dataset.key = f.key;
  hb.addEventListener("click", ()=>{
    if(f.key === state.answerKey) return; // 答えの項目はヒントにできない
    if(state.hintKeys.has(f.key)){
      state.hintKeys.delete(f.key);
      hb.classList.remove("active");
    }else{
      state.hintKeys.add(f.key);
      hb.classList.add("active");
    }
    validateStart();
  });
  hintChipsEl.appendChild(hb);

  const ab = document.createElement("button");
  ab.className = "chip" + (f.key===state.answerKey ? " active" : "");
  ab.textContent = f.label;
  ab.dataset.key = f.key;
  ab.addEventListener("click", ()=>{
    state.answerKey = f.key;
    // ヒントと重複していたら外す
    state.hintKeys.delete(f.key);
    [...answerChipsEl.children].forEach(c=>c.classList.toggle("active", c.dataset.key===f.key));
    [...hintChipsEl.children].forEach(c=>{
      if(c.dataset.key===f.key) c.classList.remove("active");
    });
    validateStart();
  });
  answerChipsEl.appendChild(ab);
});

document.querySelectorAll("#formatSeg button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll("#formatSeg button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    state.format = btn.dataset.v;
  });
});
document.querySelectorAll("#importanceSeg button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll("#importanceSeg button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    state.importanceFilter = btn.dataset.v;
    updateImportanceNote();
  });
});
function updateImportanceNote(){
  const note = document.getElementById("importanceNote");
  if(state.importanceFilter === "top"){
    const n = DATA.filter(d=>state.selectedCats.has(d.c) && d.imp===1).length;
    note.textContent = `「最重要」に分類された薬剤（現在の出題範囲で${n}剤）のみが出題対象です`;
  }else{
    const n = DATA.filter(d=>state.selectedCats.has(d.c)).length;
    note.textContent = `現在の出題範囲の全${n}剤が出題対象です`;
  }
}
document.querySelectorAll("#countChips button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll("#countChips button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    state.count = parseInt(btn.dataset.v, 10);
  });
});

function validateStart(){
  const warnBox = document.getElementById("warnBox");
  const startBtn = document.getElementById("startBtn");
  let msg = "";
  if(state.hintKeys.size===0) msg = "ヒントに表示する項目を1つ以上選んでください。";
  else if(state.selectedCats.size===0) msg = "出題範囲を1つ以上選んでください。";
  else if(buildQuizPool().length===0) msg = "選択中の条件では出題できる薬剤がありません。範囲や重要度の条件を見直してください。";
  warnBox.innerHTML = msg ? `<div class="warn">${msg}</div>` : "";
  startBtn.disabled = !!msg;
}
validateStart();

/* =====================================================================
   クイズ生成
   ===================================================================== */
function buildQuizPool(){
  return DATA.filter(d =>
    state.selectedCats.has(d.c) &&
    (state.importanceFilter === "all" || d.imp === 1) &&
    displayValue(d, state.answerKey) !== "" && displayValue(d, state.answerKey) != null
  );
}
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function startQuiz(){
  const pool = shuffle(buildQuizPool());
  const n = Math.min(state.count, pool.length);
  state.quiz = pool.slice(0, n);
  state.qi = 0;
  state.score = 0;
  state.history = [];
  document.getElementById("setupScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  renderQuestion();
}
document.getElementById("startBtn").addEventListener("click", startQuiz);

/* =====================================================================
   出題
   ===================================================================== */
function renderQuestion(){
  const item = state.quiz[state.qi];
  document.getElementById("qIndex").textContent = `問題 ${state.qi+1} / ${state.quiz.length}`;
  document.getElementById("qScore").textContent = `正解 ${state.score}`;
  document.getElementById("progressFill").style.width =
    `${Math.round((state.qi)/state.quiz.length*100)}%`;
  document.getElementById("answerLabel").textContent = `答え：${fieldLabel(state.answerKey)}`;

  // このヒントの組み合わせに該当する「正解となりうる値」をすべて集める
  state.currentAnswerSet = computeAnswerSet(item);

  // ヒントカード
  const cardsEl = document.getElementById("hintCards");
  cardsEl.innerHTML = "";
  const hintList = FIELDS.filter(f=>state.hintKeys.has(f.key));
  hintList.forEach((f, idx)=>{
    const val = displayValue(item, f.key);
    if(val === "" || val == null) return;
    const div = document.createElement("div");
    const isFull = f.key==="f" || f.key==="i" || hintList.length===1;
    div.className = "hcard" + (isFull ? " full" : "") + (f.key==="imp" ? " imp" : "");
    let valueHtml = val;
    if(f.key==="imp"){
      valueHtml = `<span class="badge-imp ${item.imp===1?'top':'normal'}">${val}</span>`;
    }
    div.innerHTML = `<div class="label">${f.label}</div><div class="value">${valueHtml}</div>`;
    cardsEl.appendChild(div);
  });

  // フィードバック・次へボタンをリセット
  const fb = document.getElementById("feedback");
  fb.className = "feedback";
  fb.innerHTML = "";
  document.getElementById("nextBtn").classList.add("hidden");

  // 回答エリア
  const choiceArea = document.getElementById("choiceArea");
  const writeArea = document.getElementById("writeArea");
  choiceArea.innerHTML = "";
  const writeInputEl = document.getElementById("writeInput");
  writeInputEl.value = "";
  writeInputEl.disabled = false;
  writeInputEl.placeholder = "答えを入力…";
  document.getElementById("writeSubmit").disabled = false;
  state.writeStage = "answer";

  if(state.format === "choice"){
    writeArea.classList.add("hidden");
    choiceArea.classList.remove("hidden");
    renderChoices(item);
  }else{
    choiceArea.classList.add("hidden");
    writeArea.classList.remove("hidden");
    document.getElementById("writeInput").focus();
  }
}

// 現在のヒント項目の値がすべて一致する薬剤を洗い出し、
// 答える項目について「正解として認める値」の集合を作る
function computeAnswerSet(item){
  const pool = DATA.filter(d =>
    state.selectedCats.has(d.c) &&
    (state.importanceFilter === "all" || d.imp === 1)
  );
  const matches = pool.filter(d=>{
    for(const key of state.hintKeys){
      if(displayValue(d, key) !== displayValue(item, key)) return false;
    }
    return true;
  });
  const values = matches
    .map(d=>displayValue(d, state.answerKey))
    .filter(v=>v!=="" && v!=null);
  const list = [...new Set(values)];
  const normSet = new Set(list.map(normalize));
  return { list, normSet };
}

function renderChoices(item){
  const correct = displayValue(item, state.answerKey);
  const answerSet = state.currentAnswerSet;
  const poolValues = [...new Set(
    DATA.filter(d=>state.selectedCats.has(d.c))
        .map(d=>displayValue(d, state.answerKey))
        .filter(v=>v!=="" && v!=null && !answerSet.normSet.has(normalize(v)))
  )];
  const shuffledPool = shuffle(poolValues);
  const maxOptions = state.answerKey==="imp" ? 2 : 4;
  const distractors = shuffledPool.slice(0, maxOptions-1);
  const options = shuffle([correct, ...distractors]);
  state.currentChoices = options;

  const choiceArea = document.getElementById("choiceArea");
  options.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = opt;
    btn.addEventListener("click", ()=>submitAnswer(opt, btn));
    choiceArea.appendChild(btn);
  });
}

document.getElementById("writeSubmit").addEventListener("click", handleWriteSubmit);
document.getElementById("writeInput").addEventListener("keydown", (e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    handleWriteSubmit();
  }
});

function handleWriteSubmit(){
  const input = document.getElementById("writeInput");
  const val = input.value.trim();

  if(state.writeStage === "confirm"){
    // 不正解後：正解をタイプすると次の問題へ進む
    if(state.currentAnswerSet.normSet.has(normalize(val)) && val !== ""){
      goNext();
    }else{
      input.classList.add("shake");
      setTimeout(()=>input.classList.remove("shake"), 300);
    }
    return;
  }

  // 通常の回答（空欄でも送信可）
  submitAnswer(val, null);
}

function normalize(s){
  return String(s).trim().replace(/\s+/g,"").replace(/・/g,"").replace(/、/g,"");
}

function submitAnswer(given, btnEl){
  const answerSet = state.currentAnswerSet;
  const isCorrect = answerSet.normSet.has(normalize(given));
  const correctList = answerSet.list; // 表示用の正解一覧（複数の場合あり）
  if(isCorrect) state.score++;

  state.history.push({
    item: state.quiz[state.qi],
    answerKey: state.answerKey,
    given, correctList, isCorrect
  });

  // ボタン無効化・見た目更新（選択式）
  if(state.format==="choice"){
    document.querySelectorAll(".choice-btn").forEach(b=>{
      b.disabled = true;
      if(answerSet.normSet.has(normalize(b.textContent))) b.classList.add("correct");
      else if(b === btnEl) b.classList.add("wrong");
    });
  }else{
    if(isCorrect){
      document.getElementById("writeInput").disabled = true;
      document.getElementById("writeSubmit").disabled = true;
      state.writeStage = "done";
    }else{
      // 不正解の場合は再入力できる状態にし、正解をタイプすると次へ進めるようにする
      const input = document.getElementById("writeInput");
      input.value = "";
      input.disabled = false;
      input.placeholder = "正解を入力すると次の問題へ進みます";
      document.getElementById("writeSubmit").disabled = false;
      input.focus();
      state.writeStage = "confirm";
    }
  }

  const fb = document.getElementById("feedback");
  fb.classList.add("show", isCorrect ? "correct" : "wrong");
  fb.innerHTML = isCorrect
    ? `正解です！`
    : `不正解です。<div class="sub">正解：${correctList.join(" ／ ")}</div>`;

  document.getElementById("qScore").textContent = `正解 ${state.score}`;
  document.getElementById("nextBtn").classList.remove("hidden");
}

function goNext(){
  state.qi++;
  if(state.qi >= state.quiz.length){
    showResult();
  }else{
    renderQuestion();
  }
}

document.getElementById("nextBtn").addEventListener("click", goNext);

document.getElementById("quitBtn").addEventListener("click", ()=>{
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("setupScreen").classList.remove("hidden");
});

/* =====================================================================
   結果画面
   ===================================================================== */
function showResult(){
  document.getElementById("progressFill").style.width = "100%";
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");

  const total = state.quiz.length;
  document.getElementById("resultScore").textContent = `${state.score} / ${total}`;
  const rate = total ? state.score/total : 0;
  let msg = "";
  if(rate === 1) msg = "パーフェクト！お見事です 🎉";
  else if(rate >= 0.8) msg = "よくできました！この調子で！";
  else if(rate >= 0.5) msg = "あと少し、復習して伸ばしましょう";
  else msg = "間違えた薬剤を重点的に復習しましょう";
  document.getElementById("resultMsg").textContent = msg;

  const reviewList = document.getElementById("reviewList");
  reviewList.innerHTML = "";
  const wrongs = state.history.filter(h=>!h.isCorrect);
  if(wrongs.length>0){
    const heading = document.createElement("div");
    heading.style.cssText = "font-weight:800;font-size:.9rem;margin:6px 4px 10px;";
    heading.textContent = `間違えた問題（${wrongs.length}件）`;
    reviewList.appendChild(heading);
    wrongs.forEach(h=>{
      const div = document.createElement("div");
      div.className = "review-item";
      div.innerHTML = `
        <div class="qname">${h.item.n}（${h.item.c}）</div>
        <div>あなたの回答：<span class="ans-wrong">${h.given || "（未回答）"}</span></div>
        <div>正解：<span class="ans-correct">${h.correctList.join(" ／ ")}</span></div>
      `;
      reviewList.appendChild(div);
    });
  }
}

document.getElementById("retryBtn").addEventListener("click", startQuiz);
document.getElementById("backToSetup").addEventListener("click", ()=>{
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("setupScreen").classList.remove("hidden");
});
</script>
